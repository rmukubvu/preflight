# Fixture-local preflight configuration for the Terraform smoke project.

version: 1

llm:
  provider: none
  bedrock:
    region: us-east-1
    model_id: amazon.nova-lite-v1:0
  claude:
    model: claude-haiku-4-5-20251001
  openai:
    model: gpt-4o-mini
  ollama:
    base_url: http://localhost:11434
    model: gemma3

floci:
  image: hectorvent/floci:latest
  port: 4566

stack:
  type: terraform
  dir: .

assertions:
  behavioural:
    sqs_to_lambda_to_dynamodb:
      - queue: job-queue-fixture
        table: jobs-table-fixture
        message_body: '{"id":"job-123"}'
        expected_key:
          id: job-123
